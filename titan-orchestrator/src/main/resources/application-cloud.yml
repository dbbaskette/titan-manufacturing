# =============================================================================
# Cloud Foundry Profile — Titan Orchestrator
# =============================================================================
# Activated by: SPRING_PROFILES_ACTIVE=cloud
# LLM credentials provided by titan-ai (GenAI on Tanzu) via VCAP_SERVICES
# Model: tanzu-gpt-oss-120b-v1025
# =============================================================================

spring:
  datasource:
    url: ${vcap.services.titan-pg.credentials.jdbc-url}
    username: ${vcap.services.titan-pg.credentials.username}
    password: ${vcap.services.titan-pg.credentials.password}
  autoconfigure:
    # Disable Embabel's Anthropic wiring — no Anthropic key available on CF
    exclude:
      - com.embabel.agent.autoconfigure.models.anthropic.AgentAnthropicAutoConfiguration
  ai:
    openai:
      # GenAI on Tanzu provides credentials via VCAP_SERVICES under 'titan-ai'
      # api_key and api_base are the standard credential fields from the GenAI service broker
      api-key: ${vcap.services.titan-ai.credentials.api_key:${OPENAI_API_KEY:}}
      base-url: ${vcap.services.titan-ai.credentials.api_base:${OPENAI_BASE_URL:https://api.openai.com}}
      chat:
        options:
          model: ${vcap.services.titan-ai.credentials.model_name:openai/gpt-oss-120b}
    mcp:
      client:
        # Do not auto-initialize connections at startup — prevents crash if
        # agents are not yet reachable. Connections are made on first tool call.
        initialized: false

# Embabel model alias must match one from its built-in openai-models.yml
# (gpt-5, gpt-5-mini, gpt-4.1, etc.). The actual model sent to the API is
# controlled by spring.ai.openai.chat.options.model above, not by this alias.
embabel:
  agent:
    platform:
      models:
        openai:
          api-key: ${vcap.services.titan-ai.credentials.api_key:${OPENAI_API_KEY:}}
          base-url: ${vcap.services.titan-ai.credentials.api_base:${OPENAI_BASE_URL:https://api.openai.com}}
  models:
    default-llm: gpt-4.1

server:
  port: 8080
