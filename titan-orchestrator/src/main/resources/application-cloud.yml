# =============================================================================
# Cloud Foundry Profile — Titan Orchestrator
# =============================================================================
# Activated by: SPRING_PROFILES_ACTIVE=cloud
# LLM credentials provided by titan-ai (GenAI on Tanzu) via VCAP_SERVICES
# Model: tanzu-gpt-oss-120b-v1025
# =============================================================================

spring:
  ai:
    openai:
      api-key: ${vcap.services.titan-ai.credentials.api-key:${OPENAI_API_KEY:}}
      base-url: ${vcap.services.titan-ai.credentials.url:https://api.openai.com}
      chat:
        options:
          model: ${vcap.services.titan-ai.credentials.model:tanzu-gpt-oss-120b}

server:
  port: 8080
