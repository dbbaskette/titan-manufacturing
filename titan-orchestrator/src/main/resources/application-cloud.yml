# =============================================================================
# Cloud Foundry Profile — Titan Orchestrator
# =============================================================================
# Activated by: SPRING_PROFILES_ACTIVE=cloud
#
# Credentials come from VCAP_SERVICES at runtime:
#   - titan-ai (GenAI) → auto-wired by java-cfenv GenAIChatCfEnvProcessor
#   - titan-pg (Postgres) → auto-wired by java-cfenv CfDataSourceEnvironmentPostProcessor
#   - titan-rabbitmq → auto-wired by Spring Boot RabbitAutoConfiguration
# =============================================================================

spring:
  datasource:
    url: ${vcap.services.titan-pg.credentials.jdbcUrl}
    username: ${vcap.services.titan-pg.credentials.user}
    password: ${vcap.services.titan-pg.credentials.password}
  autoconfigure:
    exclude:
      - com.embabel.agent.autoconfigure.models.anthropic.AgentAnthropicAutoConfiguration
  ai:
    mcp:
      client:
        initialized: false

# Embabel reads credentials separately from Spring AI — must be set explicitly.
# The alias must match one from Embabel's built-in openai-models.yml catalog;
# the actual model sent to the API is controlled by spring.ai.openai.chat.options.model
# (auto-configured by java-cfenv from the titan-ai binding).
embabel:
  agent:
    platform:
      models:
        openai:
          api-key: ${vcap.services.titan-ai.credentials.endpoint.api_key:${OPENAI_API_KEY:}}
          base-url: ${vcap.services.titan-ai.credentials.endpoint.api_base:${OPENAI_BASE_URL:https://api.openai.com}}/openai
  models:
    default-llm: gpt-4.1

server:
  port: 8080
